    <circle cx="6" cy="6" r="2" fill="#6366f1" opacity="0.8"/>
    <circle cx="18" cy="6" r="2" fill="#06b6d4" opacity="0.8"/>
    <circle cx="6" cy="18" r="2" fill="#06b6d4" opacity="0.8"/>
    <circle cx="18" cy="18" r="2" fill="#6366f1" opacity="0.8"/>
    <line x1="12" y1="12" x2="6" y2="6" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="12" x2="18" y2="6" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="12" x2="6" y2="18" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="12" x2="18" y2="18" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Text "AI Insight" -->
  <text x="32" y="27" font-family="Inter, Pretendard, sans-serif" font-size="22" font-weight="700" fill="url(#logoGrad)" letter-spacing="-0.02em">
