<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Circular background -->
  <circle cx="40" cy="40" r="38" fill="url(#avatarGrad)" opacity="0.15"/>
  <circle cx="40" cy="40" r="36" stroke="url(#avatarGrad)" stroke-width="2" fill="none"/>
  <!-- Robot head -->
  <rect x="24" y="26" width="32" height="28" rx="8" fill="url(#avatarGrad)" opacity="0.9"/>
  <!-- Eyes -->
  <circle cx="33" cy="38" r="4" fill="#ffffff"/>
  <circle cx="47" cy="38" r="4" fill="#ffffff"/>
  <!-- Pupils -->
  <circle cx="33" cy="38" r="2" fill="#020617"/>
  <circle cx="47" cy="38" r="2" fill="#020617"/>
  <!-- Antenna -->
  <line x1="40" y1="26" x2="40" y2="18" stroke="url(#avatarGrad)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="40" cy="16" r="3" fill="url(#avatarGrad)"/>
  <!-- Smile -->
  <path d="M34,48 Q40,52 46,48" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>